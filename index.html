<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Outfit:wght@400;900&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-yellow: #f8ff00;
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: #020617;
            color: white; 
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 0;
        }

        .bungee { font-family: 'Bungee Inline', cursive; }

        .glass { 
            background: rgba(15, 23, 42, 0.96); 
            backdrop-filter: blur(20px); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
        }

        #particle-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        .turbo-btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 10px 20px rgba(188, 19, 254, 0.3);
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-10px, 0); }
            20%, 40%, 60%, 80% { transform: translate(10px, 0); }
        }
        .shake-effect { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .option-btn {
            text-align: left;
            padding: 0.85rem 1.25rem;
            border-radius: 1.25rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            color: white;
            cursor: pointer;
        }
        
        .option-btn.correct { 
            background: #22c55e !important; 
            border-color: #4ade80; 
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); 
            transform: scale(1.05);
        }
        .option-btn.wrong { background: #ef4444 !important; border-color: #f87171; opacity: 0.7; }

        .flag-huge {
            font-size: clamp(4rem, 18vw, 7rem);
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            line-height: 1;
        }

        #commentary-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            pointer-events: none;
            width: 90%;
            display: flex;
            justify-content: center;
        }

        #commentary-inner {
            opacity: 0;
            background: #facc15;
            color: black;
            padding: 1.5rem 2rem;
            border-radius: 2rem;
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            font-weight: 900;
            text-transform: uppercase;
            border: 6px solid black;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 100%;
            word-wrap: break-word;
            line-height: 1.1;
        }

        #commentary-inner.wrong-comment { background: #ef4444; color: white; border-color: #450a0a; }

        .commentary-pop {
            animation: spinPop 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes spinPop {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            10% { transform: scale(1) rotate(5deg); opacity: 1; }
            90% { transform: scale(1.1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0.5) opacity: 0; }
        }

        @keyframes winPulse {
            0% { box-shadow: 0 0 0px #facc15; }
            50% { box-shadow: 0 0 50px #facc15; }
            100% { box-shadow: 0 0 0px #facc15; }
        }
        .win-glow { animation: winPulse 2s infinite; border-color: #facc15 !important; }

        .victory-title {
            background: linear-gradient(to bottom, #fde047, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            line-height: 1;
        }

        /* Leaderboard styling */
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 0.75rem;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>

            {n:"Togo",c:"Lomé",f:"🇹🇬"},{n:"Tonga",c:"Nuku'alofa",f:"🇹🇴"},{n:"Trinidad ja Tobago",c:"Port of Spain",f:"🇹🇹"},{n:"Tšad",c:"N'Djamena",f:"🇹🇩"},{n:"Tšekki",c:"Praha",f:"🇨🇿"},{n:"Tunisia",c:"Tunis",f:"🇹🇳"},{n:"Turkki",c:"Ankara",f:"🇹🇷"},{n:"Turkmenistan",c:"Ašgabat",f:"🇹🇲"},{n:"Tuvalu",c:"Funafuti",f:"🇹🇻"},{n:"Uganda",c:"Kampala",f:"🇺🇬"},
            {n:"Ukraina",c:"Kiova",f:"🇺🇦"},{n:"Unkari",c:"Budapest",f:"🇭🇺"},{n:"Uruguay",c:"Montevideo",f:"🇺🇾"},{n:"Uusi-Seelanti",c:"Wellington",f:"🇳🇿"},{n:"Uzbekistan",c:"Taškent",f:"🇺🇿"},{n:"Valko-Venäjä",c:"Minsk",f:"🇧🇾"},{n:"Vanuatu",c:"Port Vila",f:"🇻🇺"},{n:"Vatikaanivaltio",c:"Vatikaani",f:"🇻🇦"},{n:"Venezuela",c:"Caracas",f:"🇻🇪"},{n:"Venäjä",c:"Moskova",f:"🇷🇺"},
            {n:"Vietnam",c:"Hanoi",f:"🇻🇳"},{n:"Viro",c:"Tallinna",f:"🇪🇪"},{n:"Yhdysvallat",c:"Washington, D.C.",f:"🇺🇸"},{n:"Yhdistynyt kuningaskunta",c:"Lontoo",f:"🇬🇧"},{n:"Zimbabwe",c:"Harare",f:"🇿🇼"}
        ];

        let state = {
            score: 0, streak: 0, multiplier: 1.0, current: null, isBusy: false,
            deck: [], totalCount: MAAT.length, completedCount: 0,
            highScores: JSON.parse(localStorage.getItem('geoguru_top5') || '[]')
        };

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSfx(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const g = audioCtx.createGain(); g.connect(audioCtx.destination);
            
            if (type === 'correct') {
                const o = audioCtx.createOscillator(); o.connect(g);
                o.type = 'sine';
                o.frequency.setValueAtTime(500, now); o.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.2);
                o.start(); o.stop(now + 0.2);
            } else if (type === 'wrong') {
                const o1 = audioCtx.createOscillator();
                const o2 = audioCtx.createOscillator();
                o1.connect(g); o2.connect(g);
                o1.type = 'sawtooth'; o2.type = 'square';
                o1.frequency.setValueAtTime(100, now); o1.frequency.linearRampToValueAtTime(40, now + 0.5);
                o2.frequency.setValueAtTime(105, now); o2.frequency.linearRampToValueAtTime(45, now + 0.5);
                g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now + 0.5);
                o1.start(); o2.start();
                o1.stop(now + 0.5); o2.stop(now + 0.5);
            } else if (type === 'victory') {
                [523, 659, 783, 1046].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(g);
                    o.frequency.setValueAtTime(f, now + (i * 0.1));
                    g.gain.setValueAtTime(0.1, now + (i * 0.1)); g.gain.linearRampToValueAtTime(0, now + (i * 0.1) + 0.5);
                    o.start(now + (i * 0.1)); o.stop(now + (i * 0.1) + 0.5);
                });
            }
        }

        function updateLeaderboardUI() {
            const list = document.getElementById('leaderboard-list');
            if (!state.highScores || !state.highScores.length) {
                list.innerHTML = '<p class="text-[10px] text-white/30 italic">Ei vielä tuloksia...</p>';
                return;
            }
            list.innerHTML = state.highScores.map((s, i) => `
                <div class="leaderboard-row">
                    <span>${i+1}. ${s.name}</span>
                    <span class="text-yellow-400">${s.score.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function saveHighScore() {
            const name = document.getElementById('player-name').value.trim().toUpperCase() || 'GEONAUTTI';
            state.highScores.push({ name, score: state.score });
            state.highScores.sort((a, b) => b.score - a.score);
            state.highScores = state.highScores.slice(0, 5);
            localStorage.setItem('geoguru_top5', JSON.stringify(state.highScores));
            restartGame();
        }

        function handleAnswer(text, btn) {
            if (state.isBusy) return;
            state.isBusy = true;
            initAudio();

            const isCorrect = text === state.current.correctValue;
            if (isCorrect) {
                btn.classList.add('correct');
                playSfx('correct');
                createFireworks();
                
                state.streak++;
                state.multiplier = Math.min(10.0, 1.0 + (state.streak * 0.2));
                state.score += Math.floor(1000 * state.multiplier);
                
                document.getElementById('score').innerText = state.score.toLocaleString();
                document.getElementById('streak-val').innerText = state.streak;
                document.getElementById('current-rank').innerText = `EDISTYMINEN: ${Math.floor((state.completedCount / state.totalCount) * 100)}%`;
                
                const combo = document.getElementById('combo-display');
                combo.classList.remove('hidden');
                document.getElementById('combo-val').innerText = state.multiplier.toFixed(1);
                
                showCommentary(true);

                if (state.deck.length === 0) {
                    setTimeout(showVictory, 2000);
                } else {
                    setTimeout(nextQuestion, 1800);
                }
            } else {
                btn.classList.add('wrong');
                playSfx('wrong');
                document.body.classList.add('shake-effect');
                
                document.querySelectorAll('.option-btn').forEach(b => {
                    if (b.innerText === state.current.correctValue) b.classList.add('correct');
                });
                
                showCommentary(false);
                document.getElementById('correct-answer-was').innerText = state.current.correctValue;
                document.getElementById('fail-count').innerText = state.completedCount - 1;
                document.getElementById('final-score').innerText = state.score.toLocaleString();
                
                setTimeout(() => {
                    document.body.classList.remove('shake-effect');
                    document.getElementById('view-quiz').classList.add('hidden');
                    document.getElementById('view-gameover').classList.remove('hidden');
                    state.isBusy = false;
                }, 2000);
            }
        }

        function createFireworks(x, y, power = 15) {
            const colors = ['#facc15', '#00f2ff', '#bc13fe', '#ffffff', '#22c55e'];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: x || canvas.width / 2, y: y || canvas.height / 2,
                    vx: (Math.random() - 0.5) * power, vy: (Math.random() - 0.5) * power,
                    size: Math.random() * 3 + 1, color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0, gravity: 0.2
                });
            }
        }

        function showVictory() {
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-victory').classList.remove('hidden');
            playSfx('victory');
            if (victoryInterval) clearInterval(victoryInterval);
            victoryInterval = setInterval(() => {
                createFireworks(Math.random() * canvas.width, Math.random() * canvas.height, 10);
            }, 300);
            state.isBusy = false;
        }

        function handleEndOfGame() {
            document.getElementById('view-victory').classList.add('hidden');
            document.getElementById('view-gameover').classList.remove('hidden');
            document.getElementById('fail-count').innerText = state.totalCount;
            document.getElementById('final-score').innerText = state.score.toLocaleString();
        }

        function showCommentary(isGood) {
            const inner = document.getElementById('commentary-inner');
            const txt = document.getElementById('commentary-text');
            txt.innerText = isGood ? COMMENTS_GOOD[Math.floor(Math.random() * COMMENTS_GOOD.length)] : COMMENTS_BAD[Math.floor(Math.random() * COMMENTS_BAD.length)];
            inner.className = isGood ? '' : 'wrong-comment';
            inner.classList.remove('commentary-pop');
            void inner.offsetWidth;
            inner.classList.add('commentary-pop');
        }

        function nextQuestion() {
            state.isBusy = false;
            
            if (state.deck.length === 0) {
                showVictory();
                return;
            }

            const country = state.deck.pop();
            state.completedCount++;
            
            const pool = MAAT.map(m => m.c);
            let options = [country.c];
            while (options.length < 4) {
                const randC = pool[Math.floor(Math.random() * pool.length)];
                if (!options.includes(randC)) options.push(randC);
            }
            options.sort(() => Math.random() - 0.5);

            state.current = { correctValue: country.c };
            document.getElementById('flag-display').innerText = country.f;
            document.getElementById('question-text').innerText = `MIKÄ ON MAAN ${country.n.toUpperCase()} PÄÄKAUPUNKI?`;
            document.getElementById('current-q-num').innerText = state.completedCount;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => handleAnswer(opt, b);
                grid.appendChild(b);
            });

            document.getElementById('view-start').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            document.getElementById('view-gameover').classList.add('hidden');
            document.getElementById('view-victory').classList.add('hidden');
        }

        function restartGame() {
            if (victoryInterval) clearInterval(victoryInterval);
            state.score = 0;
            state.streak = 0;
            state.multiplier = 1.0;
            state.completedCount = 0;
            state.deck = [...MAAT].sort(() => Math.random() - 0.5);
            state.isBusy = false;
            
            document.getElementById('score').innerText = "0";
            document.getElementById('streak-val').innerText = "0";
            document.getElementById('combo-display').classList.add('hidden');
            document.getElementById('current-rank').innerText = "EDISTYMINEN: 0%";
            document.getElementById('player-name').value = "";
            
            updateLeaderboardUI();
            
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-gameover').classList.add('hidden');
            document.getElementById('view-victory').classList.add('hidden');
            document.getElementById('view-start').classList.remove('hidden');
        }

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
                p.life -= 0.02;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        document.getElementById('btn-start').onclick = () => {
            initAudio();
            // Alustetaan pakka ennen pelin alkua varmuuden vuoksi
            state.deck = [...MAAT].sort(() => Math.random() - 0.5);
            nextQuestion();
        };

        document.getElementById('btn-save-score').onclick = saveHighScore;

        window.addEventListener('resize', initParticles);
        initParticles(); 
        updateLeaderboardUI();
        animate();
    </script>
</body>
</html>
